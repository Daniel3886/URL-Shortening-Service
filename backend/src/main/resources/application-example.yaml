# Copy this file to application-local.yaml and fill in your actual values.
# application-local.yaml is gitignored and never committed.
spring:
  application:
    name: URL-Shortening-Service
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:postgresql://localhost:5432/your_database_name
    username: your_postgres_username
    password: your_postgres_password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password

  cache:
    type: redis

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: url-stats-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.springboot.urlshorteningservice.dto
        spring.json.value.default.type: org.springboot.urlshorteningservice.dto.UrlClickedEvent

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  base-url: http://localhost:8080/
  ttl: 24h # auto removal and Redis cache TTL